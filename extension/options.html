<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Réglages — RechercheImmo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #0f1115;
        color: #e8eaed;
        max-width: 520px;
        margin: 40px auto;
        padding: 0 20px;
      }
      h1 {
        font-size: 20px;
      }
      label {
        display: block;
        margin: 18px 0 6px;
        color: #9aa0aa;
        font-size: 14px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #272b34;
        background: #181b22;
        color: #e8eaed;
        font: inherit;
      }
      button {
        margin-top: 22px;
        font: inherit;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        background: #4f8cff;
        color: white;
        padding: 10px 18px;
      }
      .hint {
        color: #9aa0aa;
        font-size: 13px;
        line-height: 1.5;
      }
      .status {
        margin-left: 12px;
        color: #57d28a;
      }
    </style>
  </head>
  <body>
    <h1>Réglages RechercheImmo</h1>
    <p class="hint">
      Renseigne l'URL de ton site (local ou Vercel) et le secret partagé. Le
      secret doit être identique à la variable <code>API_SECRET</code> du site.
    </p>

    <label for="apiUrl">URL du site</label>
    <input
      id="apiUrl"
      type="url"
      placeholder="https://mon-site.vercel.app"
    />

    <label for="secret">Secret partagé (API_SECRET)</label>
    <input id="secret" type="password" placeholder="le même que côté serveur" />

    <div>
      <button id="save">Enregistrer</button>
      <span id="status" class="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
